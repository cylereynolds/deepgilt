<!doctype html><html><head><meta charset="utf-8"><title>Lords of Pain — scale compare (?ts=64|128|192)</title>
<style>
  html,body{margin:0;background:#0b0a0d;color:#cdbfa6;font:13px system-ui;overflow:hidden}
  #c{display:block;margin:0 auto;background:#0b0a0d;image-rendering:auto}
  #hud{position:fixed;left:8px;top:6px;opacity:.85;font-size:13px;pointer-events:none;text-shadow:0 1px 3px #000}
</style></head><body>
<div id="hud"></div>
<canvas id="c" width="1120" height="720"></canvas>
<!-- the ACTUAL engine modules (same files index.html loads) -->
<script src="dg/common/iso.js"></script>
<script src="dg/core/mapengine.js"></script>
<script src="dg/core/maprenderer.js"></script>
<script>
(function(){
  var DGC=window.DGC, cv=document.getElementById('c'), ctx=cv.getContext('2d');
  var CW=cv.width, CH=cv.height;

  // --- tile size from URL (?ts=64|128|192). 64 = the real client's projection. 2:1 dimetric. ---
  var TS_SCREEN = parseInt((location.search.match(/ts=(\d+)/)||[])[1],10) || 64;
  var TW = TS_SCREEN, TH = TS_SCREEN/2, WALLZ = Math.round(TS_SCREEN*0.47);   // WALLZ scales with tile (≈30 at 64)
  var SCALE = TW/64;                                                          // sprite display scale relative to the 64/32 baseline
  document.getElementById('hud').textContent =
    'Lords of Pain · TW='+TW+'/TH='+TH+(TS_SCREEN===64?' (current)':' (Option B)')+' · SCALE×'+SCALE.toFixed(2)+' · native colors, no grade';

  // --- makeIso: iso.js's projection math, but with PARAMETERIZED TW/TH (harness-only; iso.js untouched) ---
  function makeIso(GW,GH,TS,TW,TH,WALLZ){
    var OX=GH*(TW/2)+TW/2, OY=WALLZ+TH;
    var GCW=(GW+GH)*(TW/2)+TW, GCH=(GW+GH)*(TH/2)+OY+TH;
    function isoC(gx,gy){return {x:(gx-gy)*(TW/2)+OX, y:(gx+gy)*(TH/2)+OY};}
    function w2i(wx,wy){return isoC(wx/TS,wy/TS);}
    function i2w(ix,iy){var ax=ix-OX,ay=iy-OY;var gx=(ax/(TW/2)+ay/(TH/2))/2,gy=(ay/(TH/2)-ax/(TW/2))/2;return {x:gx*TS,y:gy*TS};}
    return {TW:TW,TH:TH,WALLZ:WALLZ,OX:OX,OY:OY,GCW:GCW,GCH:GCH,isoC:isoC,w2i:w2i,i2w:i2w};
  }

  var GW=24, GH=24, TS=32;
  // open arena: floor interior + 1-cell wall ring (gives wall cubes for context)
  var map=new DGC.MapEngine(GW,GH,TS,Math.random), c=[];
  for(var y=0;y<GH;y++){c[y]=[];for(var x=0;x<GW;x++)c[y][x]=(x===0||y===0||x===GW-1||y===GH-1)?1:0;}
  map.cells=c; map.rooms=[{x:1,y:1,w:GW-2,h:GH-2,cx:GW>>1,cy:GH>>1}]; map.exitRoom=map.rooms[0]; map.specials=[];

  var iso=makeIso(GW,GH,TS,TW,TH,WALLZ), mr=new DGC.MapRenderer(map,iso);

  // --- load LoP assets ---
  var ROOT='art/lords_of_pain/';
  function img(p){var i=new Image();i.src=encodeURI(ROOT+p);return i;}
  var stone=img('environment/ground_stone1.png');
  var ov1=img('environment/ground_variation1.png'), ov2=img('environment/ground_variation2.png');
  var PROP={
    rocks:img('prop/rocks/SE/rocks_SE_315.0_0.png'),
    bones1:img('prop/bones1/SE/bones1_SE_315.0_0.png'),
    bones2:img('prop/bones2/SE/bones2_SE_315.0_0.png'),
    mushrooms:img('prop/mushrooms/SE/mushrooms_SE_315.0_0.png'),
    column1:img('prop/column1/SE/column1_SE_315.0_0.png'),
    barrel:img('prop/barrel/SE/barrel_SE_315.0_0.png'),
    crate:img('prop/crate/SE/crate_SE_315.0_0.png'),
    brazier_lit:img('prop/brazier_lit/SE/brazier_lit_SE_315.0_0.png')
  };
  var hero=img('playable character/warrior/warrior_default_idle/SE/warrior_default_idle_SE_315.0_0.png');

  // tight cluster around the hero so it stays in-frame even at TW=192. sz = size at TW=64; scaled by SCALE.
  var SCENE=[
    {t:'column1',gx:9,gy:9,sz:300},{t:'column1',gx:15,gy:9,sz:300},{t:'column1',gx:9,gy:15,sz:300},{t:'column1',gx:15,gy:15,sz:300},
    {t:'brazier_lit',gx:12,gy:9,sz:280},
    {t:'crate',gx:10,gy:11,sz:250},{t:'barrel',gx:11,gy:11,sz:250},{t:'barrel',gx:14,gy:13,sz:250},
    {t:'rocks',gx:10,gy:13,sz:240},{t:'rocks',gx:13,gy:11,sz:240},
    {t:'bones1',gx:11,gy:14,sz:240},{t:'bones2',gx:13,gy:13,sz:240},
    {t:'mushrooms',gx:10,gy:12,sz:240},{t:'mushrooms',gx:14,gy:11,sz:240}
  ];
  var HERO={gx:12,gy:12};
  function W(g){return (g+0.5)*TS;}
  // anchor a 256 LoP frame (scaled) so the figure's feet/base sit on the ground point p (figure ~0.60 down the frame)
  function blitLOP(c2,frame,px,py,sz){ if(!frame.complete||!frame.naturalWidth)return; sz=sz*SCALE;
    c2.imageSmoothingEnabled=true; c2.drawImage(frame, (px-sz/2)|0, (py-sz*0.60)|0, sz|0, sz|0); }

  function drawables(){
    var D=[];
    SCENE.forEach(function(o){var wx=W(o.gx),wy=W(o.gy);
      D.push({k:(wx+wy)/TS, draw:function(cx2,r){var p=r.project(wx,wy); blitLOP(cx2,PROP[o.t]||PROP.rocks,p.x,p.y,o.sz||240);}});});
    var hx=W(HERO.gx),hy=W(HERO.gy);
    D.push({k:(hx+hy)/TS, draw:function(cx2,r){var p=r.project(hx,hy); blitLOP(cx2,hero,p.x,p.y,256);}});
    return D;
  }

  function rebuild(){ mr.buildGroundLOP(stone, stone.complete&&stone.naturalWidth>0, [ov1,ov2]); }
  function draw(){ if(!mr.ground) rebuild(); ctx.clearRect(0,0,CW,CH);
    mr.render(ctx,CW,CH, W(HERO.gx), W(HERO.gy), drawables()); }

  [stone,ov1,ov2].forEach(function(im){im.onload=function(){mr.ground=null;draw();};});
  Object.keys(PROP).forEach(function(k){PROP[k].onload=draw;}); hero.onload=draw;
  draw(); setInterval(draw,250);
  window.__draw=draw; window.__ts=TS_SCREEN;
})();
</script>
</body></html>
